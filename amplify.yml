version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customRules:
    - source: </^[^.]+$/>
      target: /index.html
      status: '200'
    - source: '/<*>'
      target: /index.html
      status: '404-200'
